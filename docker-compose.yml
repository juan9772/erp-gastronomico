version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: erp_db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: erp_gastronomico
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
    volumes:
      - erp_mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:alpine
    container_name: erp_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - erp_redis_data:/data

  adminer:
    image: adminer
    container_name: erp_db_admin
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - mysql

volumes:
  erp_mysql_data:
  erp_redis_data:
